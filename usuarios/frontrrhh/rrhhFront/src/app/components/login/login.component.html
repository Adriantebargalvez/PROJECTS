<section class="login-page">
  <article class="login-card app-card">
    <p class="login-card__eyebrow">Acceso corporativo</p>
    <h1 class="app-section-title">Iniciar sesión</h1>
    <p class="app-section-subtitle">
      Entra con un perfil con permisos de administrador, RRHH o solo lectura.
    </p>

    <form class="login-form" #loginForm="ngForm" (ngSubmit)="login()" novalidate>
      <div class="login-form__field">
        <label class="app-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          [(ngModel)]="email"
          #emailModel="ngModel"
          [class.is-invalid]="emailModel.invalid && emailModel.touched"
          required
          email
        >
        <p class="field-error" *ngIf="emailModel.invalid && emailModel.touched">
          Introduce un email válido.
        </p>
      </div>

      <div class="login-form__field">
        <label class="app-label" for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          [(ngModel)]="password"
          #passwordModel="ngModel"
          [class.is-invalid]="passwordModel.invalid && passwordModel.touched"
          required
          minlength="6"
        >
        <p class="field-error" *ngIf="passwordModel.invalid && passwordModel.touched">
          La contraseña debe tener al menos 6 caracteres.
        </p>
      </div>

      <button type="submit" class="app-btn app-btn-primary login-form__submit" [disabled]="loginForm.invalid || isSubmitting">
        <i class="bi" [ngClass]="isSubmitting ? 'bi-hourglass-split' : 'bi-box-arrow-in-right'"></i>
        {{ isSubmitting ? 'Entrando...' : 'Entrar al panel' }}
      </button>
    </form>

    <section class="demo-accounts">
      <p class="demo-accounts__title">Cuentas demo</p>
      <div class="demo-accounts__list">
        <button type="button" class="demo-account" *ngFor="let account of demoAccounts" (click)="fillDemoAccount(account)">
          <span>{{ account.name }}</span>
          <small>{{ account.role }}</small>
        </button>
      </div>
    </section>
  </article>
</section>
