<header class="topbar">
  <div class="topbar__inner page-shell">
    <a class="brand" routerLink="/hello" aria-label="Ir a inicio">
      <span class="brand__mark">
        <i class="bi bi-vinyl-fill"></i>
      </span>
      <span class="brand__copy">
        <strong>Kreitekfy</strong>
        <small>Live music experience</small>
      </span>
    </a>

    <nav class="topbar__nav" aria-label="Navegacion principal">
      <a routerLink="/hello" routerLinkActive="is-active">Inicio</a>
      <a routerLink="/novedades" routerLinkActive="is-active">Descubrir</a>
      <a *ngIf="isLoggedIn" routerLink="/perfil" routerLinkActive="is-active">Perfil</a>
    </nav>

    <div class="topbar__actions" *ngIf="isLoggedIn; else guestActions">
      <span class="session-pill">
        <i class="bi bi-broadcast-pin"></i>
        En reproduccion
      </span>
      <a class="user-chip" routerLink="/perfil">
        <i class="bi bi-person-circle"></i>
        <span>{{ fullName || 'Mi cuenta' }}</span>
      </a>
      <button class="ghost-button" type="button" (click)="logout()">Salir</button>
    </div>

    <ng-template #guestActions>
      <div class="topbar__actions">
        <a class="ghost-link" routerLink="/login">Entrar</a>
        <a class="primary-link" routerLink="/register">Crear cuenta</a>
      </div>
    </ng-template>
  </div>
</header>
