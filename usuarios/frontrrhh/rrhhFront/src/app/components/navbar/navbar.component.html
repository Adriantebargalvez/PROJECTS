<header class="topbar">
  <div class="topbar__inner">
    <a class="topbar__brand" [routerLink]="['/usuario', 'list']">
      <span class="topbar__logo">
        <i class="bi bi-people-fill"></i>
      </span>
      <div class="topbar__brand-text">
        <strong>RRHH Usuarios</strong>
        <small>Panel de administración</small>
      </div>
    </a>

    <nav class="topbar__nav">
      <a class="topbar__link" [routerLink]="['/usuario', 'list']" routerLinkActive="is-active">
        <i class="bi bi-grid-1x2-fill"></i>
        Usuarios
      </a>

      <a *ngIf="canManageUsers" class="topbar__cta" [routerLink]="['/usuario', 'new']">
        <i class="bi bi-person-plus-fill"></i>
        Nuevo usuario
      </a>

      <button type="button" class="topbar__theme" (click)="toggleTheme()" *ngIf="theme$ | async as theme">
        <i class="bi" [ngClass]="theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill'"></i>
      </button>

      <ng-container *ngIf="currentUser$ | async as currentUser; else guestSession">
        <div class="topbar__session">
          <div class="topbar__avatar">{{ currentUser.name.charAt(0) }}</div>
          <div class="topbar__user">
            <strong>{{ currentUser.name }}</strong>
            <small>{{ currentUser.role }}</small>
          </div>
        </div>

        <button type="button" class="topbar__logout" (click)="logout()" aria-label="Cerrar sesión">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </ng-container>

      <ng-template #guestSession>
        <a class="topbar__link" [routerLink]="['/login']">
          <i class="bi bi-box-arrow-in-right"></i>
          Login
        </a>
      </ng-template>
    </nav>
  </div>
</header>
